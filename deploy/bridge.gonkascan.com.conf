# Gonka Bridge — bridge.gonkascan.com
# Isolated name-based vhost. Static SPA built from /data/www/bridge-gonkascan/dist.
# Does not affect other sites on this server.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name bridge.gonkascan.com;

    ssl_certificate /etc/letsencrypt/live/bridge.gonkascan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bridge.gonkascan.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /data/www/bridge-gonkascan/dist;
    index index.html;
    charset utf-8;

    # Security headers. connect-src is opened for the Gonka mainnet host and the
    # Ethereum RPCs the bridge talks to; everything else stays locked to 'self'.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; media-src 'self'; connect-src 'self' https://node1.gonka.ai:8443 https://ethereum-rpc.publicnode.com https://*.publicnode.com https://*.alchemy.com https://*.infura.io; frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    location /assets/ { expires 1y; access_log off; try_files $uri =404; }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}

# HTTP → HTTPS redirect (also keeps the ACME challenge path reachable for renewals)
server {
    listen 80;
    listen [::]:80;
    server_name bridge.gonkascan.com;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /data/www/bridge-gonkascan/dist;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
